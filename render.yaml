# Blueprint: Render Dashboard → New → Blueprint → connect repo
# Docs: https://render.com/docs

databases:
  - name: azrun-db
    plan: free
    databaseName: azrun
    user: azrun

services:
  - type: web
    name: azrun
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: azrun-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
